<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spidey-Sense Tech Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 🎨 Aesthetic Scattered Hand-Drawn Doodle Layer 🎨 -->
    <div class="spidey-doodle-bg">
        <!-- 1. Hanging Chibi Spidey (Top Corner) -->
        <div class="doodle hanging-spidey">
            <svg viewBox="0 0 100 130" width="120" height="150">
                <line x1="50" y1="0" x2="50" y2="40" stroke="#fff" stroke-width="3" stroke-dasharray="4,4"/>
                <circle cx="50" cy="75" r="30" fill="#6c242c" stroke="#111" stroke-width="4"/>
                <!-- Eyes -->
                <path d="M35 70 Q45 65 48 80 Q38 82 35 70 Z" fill="#fff" stroke="#111" stroke-width="3"/>
                <path d="M65 70 Q55 65 52 80 Q62 82 65 70 Z" fill="#fff" stroke="#111" stroke-width="3"/>
                <!-- Web lines on face -->
                <path d="M50 45 L50 105 M20 75 L80 75" stroke="#111" stroke-width="2" opacity="0.4"/>
            </svg>
        </div>

        <!-- 2. Skyline Sketch (Bottom Left) -->
        <div class="doodle city-skyline">
            <svg viewBox="0 0 200 100" width="250" height="120">
                <rect x="10" y="40" width="30" height="60" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
                <rect x="50" y="20" width="45" height="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
                <rect x="110" y="50" width="35" height="50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
                <rect x="160" y="30" width="30" height="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
            </svg>
        </div>

        <!-- 3. Giant Corner Web (Top Right) -->
        <div class="doodle corner-web">
            <svg viewBox="0 0 100 100" width="200" height="200">
                <line x1="100" y1="0" x2="0" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
                <path d="M100 30 Q70 70 30 100 M100 60 Q80 80 60 100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
            </svg>
        </div>

        <!-- 4. Tiny Crawling Spider (Bottom Right) -->
        <div class="doodle crawling-spider">
            <svg viewBox="0 0 60 60" width="80" height="80">
                <circle cx="30" cy="30" r="10" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
                <!-- Legs -->
                <path d="M20 30 Q10 20 5 25 M20 35 Q10 45 5 40 M40 30 Q50 20 55 25 M40 35 Q50 45 55 40" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
            </svg>
        </div>
    </div>

    <!-- Main Calculator Component -->
    <div class="calculator-container">
        <div class="spidey-banner" id="banner-message">Spidey-Sense Math Mode: Active!</div>

        <div class="screen-panel">
            <div class="history" id="history"></div>
            <div class="display" id="display">0</div>
        </div>

        <div class="keypad-grid">
            <button class="num-btn" onclick="inputNumber('1')">1</button>
            <button class="num-btn" onclick="inputNumber('2')">2</button>
            <button class="num-btn" onclick="inputNumber('3')">3</button>
            <button class="op-btn" onclick="inputOperator('+')">+</button>
            
            <button class="num-btn" onclick="inputNumber('4')">4</button>
            <button class="num-btn" onclick="inputNumber('5')">5</button>
            <button class="num-btn" onclick="inputNumber('6')">6</button>
            <button class="op-btn" onclick="inputOperator('-')">&minus;</button>
            
            <button class="num-btn" onclick="inputNumber('7')">7</button>
            <button class="num-btn" onclick="inputNumber('8')">8</button>
            <button class="num-btn" onclick="inputNumber('9')">9</button>
            <button class="op-btn" onclick="inputOperator('*')">&times;</button>
            
            <button class="clear-btn" onclick="clearAll()">C</button>
            <button class="num-btn" onclick="inputNumber('0')">0</button>
            <button class="equals-btn" onclick="triggerResult()">=</button>
            <button class="op-btn" onclick="inputOperator('/')">&divide;</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
